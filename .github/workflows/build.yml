name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      - name: Create Python venv and install dependencies
        run: |
          py -3.12 -m venv python
          python\Scripts\python.exe -m pip install --upgrade pip
          python\Scripts\python.exe -m pip install -r scripts/requirements.txt

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (Windows)
        run: npm run tauri build

      - name: Create Portable Windows Build
        run: |
          mkdir portable
          copy src-tauri\target\release\script-runner.exe portable\ScriptRunner-Portable.exe
          echo "Standalone portable version - no installation required" > portable\README.txt

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: portable/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.9'

      - name: Create Python venv and install dependencies
        run: |
          python3.12 -m venv python
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install -r scripts/requirements.txt

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (macOS)
        run: npm run tauri build

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-msi/*.msi
            windows-nsis/*.exe
            windows-portable/ScriptRunner-Portable.exe
            macos-dmg/*.dmg
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
