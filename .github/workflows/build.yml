name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12.9'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate updater signing secrets
        run: |
          if (-not "$env:TAURI_SIGNING_PRIVATE_KEY") {
            throw "Missing required secret: TAURI_SIGNING_PRIVATE_KEY"
          }
          if (-not "$env:TAURI_UPDATER_PUBLIC_KEY") {
            throw "Missing required secret: TAURI_UPDATER_PUBLIC_KEY"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Python venv and install dependencies
        run: |
          py -3.12 -m venv python
          python\Scripts\python.exe -m pip install --upgrade pip
          python\Scripts\python.exe -m pip install -r scripts/requirements.txt

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (Windows)
        env:
          SR_UPDATER_PUBKEY: ${{ env.TAURI_UPDATER_PUBLIC_KEY }}
          SR_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          SR_RELEASES_REPO: ${{ github.repository }}
        run: npm run tauri build -- --config src-tauri/tauri.release.conf.json

      - name: Create Portable Windows Build
        run: |
          mkdir portable
          copy src-tauri\target\release\script-runner.exe portable\ScriptRunner-Portable.exe
          echo "Standalone portable version - no installation required" > portable\README.txt

      - name: Prepare Windows updater metadata
        run: |
          $updaterDir = "windows-updater"
          New-Item -ItemType Directory -Path $updaterDir -Force | Out-Null

          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found in src-tauri/target/release/bundle/nsis"
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Updater signature not found: $signaturePath"
          }

          Copy-Item $signaturePath "$updaterDir/$($installer.Name).sig"
          $installer.Name | Out-File "$updaterDir/installer-name.txt" -Encoding ascii
          "windows-x86_64" | Out-File "$updaterDir/updater-platform.txt" -Encoding ascii

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: portable/*
          if-no-files-found: error

      - name: Upload Windows Updater Metadata
        uses: actions/upload-artifact@v4
        with:
          name: windows-updater
          path: windows-updater/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate updater signing secrets
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "$TAURI_UPDATER_PUBLIC_KEY" ]; then
            echo "::error::Missing required secret: TAURI_UPDATER_PUBLIC_KEY"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create Python venv and install dependencies
        run: |
          python3.12 -m venv python
          ./python/bin/python -m pip install --upgrade pip
          ./python/bin/python -m pip install -r scripts/requirements.txt

      - name: Install dependencies
        run: npm install

      - name: Check macOS signing configuration
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || \
             [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || \
             [ -z "$APPLE_SIGNING_IDENTITY" ] || \
             [ -z "$APPLE_ID" ] || \
             [ -z "$APPLE_PASSWORD" ] || \
             [ -z "$APPLE_TEAM_ID" ]; then
            echo "::warning::Apple signing secrets are missing. The artifact will be unsigned and macOS may show 'app is damaged'."
          else
            echo "Apple signing secrets detected. Signed/notarized build will be attempted."
          fi

      - name: Build Tauri app (macOS)
        env:
          SR_UPDATER_PUBKEY: ${{ env.TAURI_UPDATER_PUBLIC_KEY }}
          SR_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          SR_RELEASES_REPO: ${{ github.repository }}
        run: npm run tauri build -- --config src-tauri/tauri.release.conf.json

      - name: Prepare macOS release files
        run: |
          mkdir -p macos-release
          cp src-tauri/target/release/bundle/dmg/*.dmg macos-release/
          cp START_MAC.command macos-release/START_MAC.command
          chmod +x macos-release/START_MAC.command

      - name: Upload macOS Release Files
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos-release/*
          if-no-files-found: error

      - name: Prepare macOS updater files
        run: |
          mkdir -p macos-updater

          APP_TAR="$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz 2>/dev/null | head -n 1)"
          if [ -z "$APP_TAR" ]; then
            echo "::error::Updater bundle (*.app.tar.gz) not found"
            exit 1
          fi

          SIG_FILE="${APP_TAR}.sig"
          if [ ! -f "$SIG_FILE" ]; then
            echo "::error::Updater signature not found: $SIG_FILE"
            exit 1
          fi

          cp "$APP_TAR" macos-updater/
          cp "$SIG_FILE" macos-updater/

          case "$(uname -m)" in
            arm64) PLATFORM_KEY="darwin-aarch64" ;;
            x86_64) PLATFORM_KEY="darwin-x86_64" ;;
            *)
              echo "::error::Unsupported macOS architecture: $(uname -m)"
              exit 1
              ;;
          esac

          echo "$PLATFORM_KEY" > macos-updater/updater-platform.txt

      - name: Upload macOS Updater Files
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater
          path: macos-updater/*
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Validate updater artifacts
        run: |
          set -euo pipefail

          test -f windows-updater/updater-platform.txt
          test -f windows-updater/installer-name.txt

          WIN_INSTALLER="$(cat windows-updater/installer-name.txt | tr -d '\r\n')"
          test -n "$WIN_INSTALLER"
          test -f "windows-nsis/${WIN_INSTALLER}"
          test -f "windows-updater/${WIN_INSTALLER}.sig"

          test -f macos-updater/updater-platform.txt
          MAC_ASSET="$(ls macos-updater/*.app.tar.gz | head -n 1)"
          test -n "$MAC_ASSET"
          test -f "${MAC_ASSET}.sig"

      - name: Generate latest.json for updater
        run: |
          python - <<'PY'
          import datetime
          import json
          import pathlib
          import os

          tag = os.environ["GITHUB_REF_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          version = tag[1:] if tag.startswith("v") else tag
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          def read_text(path: str) -> str:
              return pathlib.Path(path).read_text(encoding="utf-8").strip()

          platforms = {}

          win_platform = read_text("windows-updater/updater-platform.txt")
          win_installer = read_text("windows-updater/installer-name.txt")
          win_installer_path = pathlib.Path("windows-nsis") / win_installer
          if not win_installer_path.exists():
              raise SystemExit(f"Missing Windows installer artifact: {win_installer_path}")

          win_sig_path = pathlib.Path("windows-updater") / f"{win_installer}.sig"
          if not win_sig_path.exists():
              raise SystemExit(f"Missing Windows signature artifact: {win_sig_path}")

          platforms[win_platform] = {
              "url": f"{base_url}/{win_installer}",
              "signature": win_sig_path.read_text(encoding="utf-8").strip(),
          }

          mac_platform = read_text("macos-updater/updater-platform.txt")
          mac_assets = sorted(pathlib.Path("macos-updater").glob("*.app.tar.gz"))
          if not mac_assets:
              raise SystemExit("Missing macOS updater artifact (*.app.tar.gz)")

          mac_asset = mac_assets[0]
          mac_sig = pathlib.Path(str(mac_asset) + ".sig")
          if not mac_sig.exists():
              raise SystemExit(f"Missing macOS signature artifact: {mac_sig}")

          platforms[mac_platform] = {
              "url": f"{base_url}/{mac_asset.name}",
              "signature": mac_sig.read_text(encoding="utf-8").strip(),
          }

          latest = {
              "version": version,
              "notes": f"Release {tag}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc)
                  .replace(microsecond=0)
                  .isoformat()
                  .replace("+00:00", "Z"),
              "platforms": platforms,
          }

          pathlib.Path("latest.json").write_text(
              json.dumps(latest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          print("Generated latest.json for platforms:", ", ".join(platforms.keys()))
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-msi/*.msi
            windows-nsis/*.exe
            windows-portable/ScriptRunner-Portable.exe
            macos-release/*.dmg
            macos-release/START_MAC.command
            macos-updater/*.app.tar.gz
            macos-updater/*.app.tar.gz.sig
            latest.json
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
