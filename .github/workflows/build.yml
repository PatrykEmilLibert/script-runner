name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ScriptRunner ${{ github.ref_name }}'
          releaseBody: |
            ## What's Changed
            Auto-generated release from tag ${{ github.ref_name }}
            
            ### Downloads
            - **Windows**: Use `.msi` or `-setup.exe` installer
            - **macOS**: Use `.dmg` or `.app` installer
            
            ### Admin Features
            Place `sr-admin.key` file on your Desktop to enable admin-only features.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
