name: CI - Lint and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint || echo "No linter configured"
      - run: npm run type-check || echo "No type checker configured"

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux system deps (GTK/WebKit)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            build-essential
      - name: Prepare frontendDist placeholder for Tauri compile checks
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then
            printf '<!doctype html><html><body>CI placeholder</body></html>\n' > dist/index.html
          fi
      - name: Prepare python resource placeholder for Tauri compile checks
        run: |
          mkdir -p src-tauri/python
          if [ ! -f src-tauri/python/PLACEHOLDER.txt ]; then
            printf 'CI placeholder for bundled python resources\n' > src-tauri/python/PLACEHOLDER.txt
          fi
      - name: Prepare Tauri config without resources for backend lint
        run: |
          cat > src-tauri/tauri.ci.conf.json <<'EOF'
          {
            "productName": "ScriptRunner",
            "version": "6.0.14",
            "identifier": "com.scriptrunner.app",
            "build": {
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": "ScriptRunner",
                  "width": 1200,
                  "height": 800
                }
              ],
              "security": {
                "csp": null
              }
            },
            "bundle": {
              "active": false,
              "targets": "all",
              "resources": []
            }
          }
          EOF
      - run: cargo fmt --manifest-path=src-tauri/Cargo.toml -- --check
      - name: Use CI Tauri config for backend lint
        run: cp src-tauri/tauri.ci.conf.json src-tauri/tauri.conf.json
      - run: cargo clippy --manifest-path=src-tauri/Cargo.toml -- -D warnings

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test || echo "No tests configured"

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system deps (GTK/WebKit)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            build-essential
      - run: npm install
      - run: npm run build
